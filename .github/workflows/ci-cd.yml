name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: diksha/backend
  MANIFEST_REPO: https://github.com/turkardiksha345-oss/manifest-repo.git

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Build Docker image
    - name: Build Docker image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} ./backend

    # 3️⃣ Login to DockerHub
    - name: Docker login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 4️⃣ Push image
    - name: Push Docker image
      run: |
        docker push $IMAGE_NAME:${{ github.sha }}

    # 5️⃣ Clone manifest repo
    - name: Clone manifest repo
      run: |
        git clone https://${{ secrets.GIT_TOKEN }}@github.com/turkardiksha345-oss/manifest-repo.git

    # 6️⃣ Update deployment.yaml
    - name: Update image tag
      run: |
        cd manifest-repo/backend
        sed -i "s|image: .*|image: $IMAGE_NAME:${{ github.sha }}|g" deployment.yaml

    # 7️⃣ Commit & push
    - name: Commit changes
      run: |
        cd manifest-repo
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Update image to ${{ github.sha }}"
        git push origin main