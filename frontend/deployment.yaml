apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app-frontend
  namespace: default
  labels:
    app: student-app-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-app-frontend
  template:
    metadata:
      labels:
        app: student-app-frontend
    spec:
      containers:
        - name: frontend-container
          image: dikshat1024/easy-crud-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 200m
              memory: 100Mi
            limits:
              cpu: 500m
              memory: 200Mi
