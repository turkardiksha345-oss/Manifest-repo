## =========================
# STORAGE CLASS
## =========================

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-storage
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer

---
# =========================
# PERSISTENT VOLUME CLAIM
# =========================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: student-app-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-storage
  resources:
    requests:
      storage: 5Gi