apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app-backend
  namespace: default
  labels:
    app: student-app-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-app-backend
  template:
    metadata:
      labels:
        app: student-app-backend
    spec:
      containers:
        - name: student-app-container
          image: dikshat1024/backend:9f21497952383eb334252f8ff7c8cae8cf8e0ba7
          ports:  
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 100Mi
            limits:
              cpu: 500m
              memory: 200Mi